<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPT Play Clone - Xem Phim Trực Tuyến</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>

    <header class="header" id="header">
        <div class="header__container">
            <button class="header__mobile-toggle" id="mobile-toggle" aria-label="Toggle Menu">
                <i class="fa-solid fa-bars"></i>
            </button>

            <a href="#" class="header__logo">
                <span class="text-primary">FPT</span> Clone
            </a>

            <nav class="header__nav" id="main-nav">
                <ul class="nav-list">
                    <li class="nav-item active"><a href="#" class="nav-link">Trang chủ</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Truyền hình</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Phim ảnh</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Thể thao</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Anime</a></li>
                    <li class="nav-item dropdown">
                        <a href="#" class="nav-link">Xem Thêm <i class="fa-solid fa-chevron-down" style="font-size: 12px; margin-left: 4px;"></i></a>
                        <ul class="dropdown-menu">
                            <li><a href="#" class="dropdown-item">Phim chiếu rạp</a></li>
                            <li><a href="#" class="dropdown-item">Thiếu nhi</a></li>
                            <li><a href="#" class="dropdown-item">Chương trình giải trí</a></li>
                            <li><a href="#" class="dropdown-item">Game show</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>

            <div class="header__actions">
                <div class="search-box">
                    <input type="text" placeholder="Tìm kiếm phim, show..." class="search-input">
                    <button class="search-btn" aria-label="Tìm kiếm"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>

                <div class="auth-buttons">
                    <button class="btn btn-outline">Đăng nhập</button>
                    <button class="btn btn-primary"><i class="fa-solid fa-crown"></i> Mua Gói VIP</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="hero-placeholder">
            <h1>Hero Banner </h1>
            <p>Cuộn xuống để xem hiệu ứng Sticky Header</p>
        </section>
        <section class="content-placeholder">
            <h2>Các Hàng Nội Dung Phim </h2>
        </section>
    </main>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
